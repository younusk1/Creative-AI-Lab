name: creative-ai-lab

services:
  postgres:
    image: postgres:16-alpine
    container_name: creative-ai-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-creative_ai_lab}
      POSTGRES_USER: ${POSTGRES_USER:-creative_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creative-ai-network

  adminer:
    image: adminer:4.8.1
    container_name: creative-ai-lab-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - creative-ai-network

  ollama:
    image: ollama/ollama:latest
    container_name: creative-ai-lab-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - creative-ai-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: creative-ai-lab-open-webui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?Set WEBUI_SECRET_KEY in .env}
      ENABLE_SIGNUP: ${OPEN_WEBUI_ENABLE_SIGNUP:-true}
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    networks:
      - creative-ai-network

  n8n:
    image: n8nio/n8n:1.100.1
    container_name: creative-ai-lab-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-creative_ai_lab}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-creative_ai}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Karachi}
      TZ: ${GENERIC_TIMEZONE:-Asia/Karachi}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    networks:
      - creative-ai-network

volumes:
  postgres_data:
  ollama_data:
  open_webui_data:
  n8n_data:

networks:
  creative-ai-network:
    driver: bridge
